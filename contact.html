<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - QQwitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Mali:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .qr-card {
            width: 240px; /* ขนาดเท่าไพ่ทาโรต์ที่คุณทำ */
            height: 380px; 
            background: #fff;
            margin: 20px auto;
            border-radius: 15px;
            border: 8px solid #ffdfc6; /* ขอบสีน้ำตาลทองให้ดูขลัง */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .qr-card img {
            width: 80%; /* ปรับขนาด QR Code ด้านใน */
            height: auto;
        }
        .info-box {
            background: #f8ffec2f; /* สีเขียวมะกอกวินเทจ */
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 85%;
            margin: 0 auto;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="arch-container" style="max-width: 500px; min-height: 650px; border-radius: 30px; position: relative;">
        <a href="index.html" class="back-btn" style="text-decoration:none; color:#fff8f3; position: absolute; top: 20px; left: 20px;">← Back</a>
        
        <h1 class="title" style="font-size: 3rem; margin-top: 50px;">Private Reading</h1>
        <p style="font-style: italic; color: #729268;">สแกนเพื่อจองคิวดูดวงส่วนตัว</p>

        <div class="qr-card">
            <img src="image/pri.png" alt="My Line QR Code">
            <p style="color: #fffbf8; font-weight: bold; margin-top: 10px;">LINE</p>
        </div>

        <div class="info-box">
            <p style="margin: 5px 0;"><b>TikTok:</b> @QQwitch</p>
            <p style="margin: 5px 0;"><b>Line ID:</b> 733brghf</p>
            <p style="font-size: 0.8rem; opacity: 0.8; margin-top: 10px; border-top: 1px solid rgb(255, 255, 255); padding-top: 10px;">
            </p>
        </div>
    </div>
</body>
</html>
